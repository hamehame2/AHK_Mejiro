<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>メジロ式 練習サイト</title>
<style>
:root { --bg:#202728; --panel:#2a3334; --panel2:#313c3d; --card:#384445; --text:#eef2f2; --muted:#b6c0c0; --border:#4d5a5b; --accent:#a7d7c5; --accent2:#7bc4a8; --okbg:#173a2d; --ok:#d9ffee; --ngbg:#4a2020; --ng:#ffe2e2; --warnbg:#4a3d1f; --warn:#fff0c8; }
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.wrap{max-width:1440px;margin:0 auto;padding:10px 14px 18px} .top,.main{display:grid;gap:12px} .top{grid-template-columns:1.2fr .8fr;margin-bottom:12px} .main{grid-template-columns:1.08fr .92fr}
.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,.16)} .body{padding:8px}
h1{margin:0 0 4px;font-size:24px} h2{margin:0 0 6px;font-size:18px} .desc,.muted{color:var(--muted);font-size:13px;line-height:1.5}
.controls{display:grid;grid-template-columns:1.2fr .8fr .8fr auto auto auto;gap:8px;margin-top:10px}
input[type=text],select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-size:14px}
.answer-input{font-size:18px!important;padding:12px 14px!important}
button{border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer;font-size:14px}
button:hover{filter:brightness(1.08)} button.primary{background:var(--accent2);border-color:var(--accent2);color:#10211b;font-weight:700}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px} .tab{padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px} .tab.active{background:var(--accent);color:#10211b;border-color:var(--accent);font-weight:700}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px} .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--card);border:1px solid var(--border);font-size:12px;color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px} .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px} .num{font-size:24px;font-weight:800;margin-top:4px}
.progress-row{display:flex;justify-content:space-between;margin:8px 0 6px;color:var(--muted);font-size:13px} .progress{height:10px;border-radius:999px;overflow:hidden;background:#202728;border:1px solid var(--border)} .bar{height:100%;width:0%;background:var(--accent2);transition:width .2s ease}
.practice{min-height:700px;display:flex;flex-direction:column;justify-content:space-between} .head{display:flex;justify-content:space-between;gap:8px;align-items:center} .badge{display:inline-block;padding:5px 9px;border-radius:999px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:12px}
.panel{margin-top:4px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:5px 8px} .label{color:var(--muted);font-size:12px}
.question{margin-top:2px;font-size:52px;line-height:1.1;font-weight:800;letter-spacing:.04em;word-break:break-word;text-align:center} .sub{margin-top:2px;color:var(--muted);font-size:13px;text-align:center}
.stroke-row{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:2px;align-items:start;margin-top:0}.stroke-row-hidden{display:flex;justify-content:flex-start;align-items:flex-start;margin-top:0} .stroke{font-size:26px;font-weight:700;word-break:break-word} .mini-map{width:100%;height:auto;display:block;background:#ddd;border:1px solid var(--border);border-radius:12px}
.split6{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px} .mini{border:1px solid var(--border);border-radius:12px;padding:10px;background:var(--panel2);min-height:74px} .mini .k{color:var(--muted);font-size:12px} .mini .v{margin-top:6px;font-size:18px;font-weight:700;word-break:break-word}
.message{margin-top:10px;padding:10px 12px;border-radius:12px;font-size:14px;line-height:1.5} .ok{background:var(--okbg);color:var(--ok);border:1px solid #3f8b6b} .ng{background:var(--ngbg);color:var(--ng);border:1px solid #a06161} .warn{background:var(--warnbg);color:var(--warn);border:1px solid #ac9351}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px} .side-grid{display:grid;grid-template-rows:auto 1fr;gap:12px;min-height:700px} .list{display:flex;flex-direction:column;gap:8px;max-height:580px;overflow:auto;padding-right:2px} .item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px;cursor:pointer} .item.active{outline:2px solid var(--accent);outline-offset:-2px} .item-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start} .item-title{font-size:15px;font-weight:700} .item-meta,.item-stroke{margin-top:4px;color:var(--muted);font-size:12px;word-break:break-word}
.hint{margin-top:10px;padding:10px;background:var(--card);border:1px dashed var(--border);border-radius:14px;color:var(--muted);font-size:12px;line-height:1.5} .reverse-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;max-height:260px;overflow:auto} .reverse-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 10px} .empty{min-height:300px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
@media (max-width:1100px){ .top,.main{grid-template-columns:1fr} .controls{grid-template-columns:1fr 1fr} .stats{grid-template-columns:1fr 1fr} .split6{grid-template-columns:1fr} .stroke-row{grid-template-columns:1fr} .question{font-size:40px} .stroke{font-size:22px} .side-grid{min-height:auto} .list{max-height:420px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <section class="card"><div class="body">
      <h1>メジロ式 練習サイト</h1>
      <div class="desc">略語はユーザー略語と一般略語を分離し、略語活用は一般略語だけに適用しています。判定後もフォーカスを維持し、Esc で次へ進めます。</div>
      <div class="controls">
        <input id="searchInput" type="text" placeholder="語句・ストローク・カテゴリ検索" />
        <select id="subSelect"></select>
        <select id="answerModeSelect"><option value="text">判定: 出力文字列</option><option value="stroke">判定: ストローク</option></select>
        <button id="toggleStrokeBtn">ストローク非表示</button><button id="shuffleBtn">シャッフル</button><button id="resetBtn">進捗リセット</button>
      </div>
      <div class="row">
        <label class="pill"><input id="hideImeSensitive" type="checkbox" checked />IME注意を隠す</label>
        <label class="pill"><input id="lenientIme" type="checkbox" checked />IMEゆるめ判定</label>
        <label class="pill"><input id="autoNext" type="checkbox" checked />正解で自動次へ</label>
      </div>
      <div id="tabs" class="tabs"></div>
    </div></section>

    <aside class="card"><div class="body">
      <h2>進捗と使い方</h2>
      <div class="progress-row"><span>完了率</span><span id="progressText">0%</span></div>
      <div class="progress"><div id="progressBar" class="bar"></div></div>
      <div class="stats">
        <div class="stat"><div class="muted">表示件数</div><div id="countVisible" class="num">0</div></div>
        <div class="stat"><div class="muted">完了</div><div id="countDone" class="num">0</div></div>
        <div class="stat"><div class="muted">総問題数</div><div id="countTotal" class="num">0</div></div>
        <div class="stat"><div class="muted">逆引き件数</div><div id="countReverse" class="num">0</div></div>
      </div>
      <div class="hint">参考画像に寄せたキー地図を追加しました。動詞活用「する」は <code>-*</code> ベースで、1ストロークごとに1出力だけ持つように整理しています。</div>
    </div></aside>
  </div>

  <div class="main">
    <section class="card"><div class="body practice" id="practiceRoot"></div></section>
    <aside class="side-grid">
      <section class="card"><div class="body">
        <h2>逆引き</h2>
        <div class="desc">文字列からストロークを探します。空欄なら現在の例題で検索します。</div>
        <div class="row"><input id="reverseInput" type="text" placeholder="例: ありがとう / です / でした / する" /></div>
        <div id="reverseList" class="reverse-list"></div>
      </div></section>
      <section class="card"><div class="body">
        <h2>一覧</h2>
        <div id="listRoot" class="list"></div>
      </div></section>
    </aside>
  </div>
</div>

  els.toggleStrokeBtn.textContent=state.showStroke?"ストローク非表示":"ストローク表示"; els.shuffleBtn.textContent=state.shuffle?"順番固定":"シャッフル"; els.searchInput.value=state.query; els.answerModeSelect.value=state.answerMode; els.reverseInput.value=state.reverseQuery; els.hideImeSensitive.checked=state.hideImeSensitive; els.lenientIme.checked=state.lenientIme; els.autoNext.checked=state.autoNext;
}
function restoreFocus(){ if(state.focusTarget==="reverse"){els.reverseInput.focus(); const len=els.reverseInput.value.length; els.reverseInput.setSelectionRange(len,len); return;} const input=document.getElementById("answerInput"); if(input){input.focus(); const len=input.value.length; input.setSelectionRange(len,len);} }
function render(){ renderTabs(); renderSubSelect(); const rows=filteredData(); if(state.currentIndex>rows.length-1) state.currentIndex=Math.max(0,rows.length-1); renderPractice(rows); renderReverse(rows); renderList(rows); renderStats(rows); setTimeout(restoreFocus,0); }
els.searchInput.addEventListener("input",(e)=>{state.query=e.target.value; resetShuffleOrder(); setIndex(0,filteredData().length); state.focusTarget="answer"; render();});
els.reverseInput.addEventListener("input",(e)=>{state.reverseQuery=e.target.value; state.focusTarget="reverse"; render();});
els.subSelect.addEventListener("change",(e)=>{state.subcategory=e.target.value; resetShuffleOrder(); setIndex(0,filteredData().length); state.focusTarget="answer"; render();});
els.answerModeSelect.addEventListener("change",(e)=>{state.answerMode=e.target.value; state.feedback=null; state.answer=""; state.focusTarget="answer"; render();});
els.toggleStrokeBtn.addEventListener("click",()=>{state.showStroke=!state.showStroke; state.focusTarget="answer"; render();});
els.shuffleBtn.addEventListener("click",()=>{state.shuffle=!state.shuffle; resetShuffleOrder(); const rows=filteredData(); setIndex(0,rows.length); state.focusTarget="answer"; render();});
els.resetBtn.addEventListener("click",()=>{state.done=new Set(); state.answer=""; state.feedback=null; state.focusTarget="answer"; render();});
els.hideImeSensitive.addEventListener("change",(e)=>{state.hideImeSensitive=e.target.checked; resetShuffleOrder(); setIndex(0,filteredData().length); state.focusTarget="answer"; render();});
els.lenientIme.addEventListener("change",(e)=>{state.lenientIme=e.target.checked; state.focusTarget="answer"; render();});
els.autoNext.addEventListener("change",(e)=>{state.autoNext=e.target.checked; state.focusTarget="answer"; render();});
render();
</script>
</body>
</html>
