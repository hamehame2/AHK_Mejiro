<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>メジロ式 練習サイト</title>
<style>
:root { --bg:#202728; --panel:#2a3334; --panel2:#313c3d; --card:#384445; --text:#eef2f2; --muted:#b6c0c0; --border:#4d5a5b; --accent:#a7d7c5; --accent2:#7bc4a8; --okbg:#173a2d; --ok:#d9ffee; --ngbg:#4a2020; --ng:#ffe2e2; --warnbg:#4a3d1f; --warn:#fff0c8; }
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.wrap{max-width:1440px;margin:0 auto;padding:10px 14px 18px} .top,.main{display:grid;gap:12px} .top{grid-template-columns:1.2fr .8fr;margin-bottom:12px} .main{grid-template-columns:1.08fr .92fr}
.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,.16)} .body{padding:8px}
h1{margin:0 0 4px;font-size:24px} h2{margin:0 0 6px;font-size:18px} .desc,.muted{color:var(--muted);font-size:13px;line-height:1.5}
.controls{display:grid;grid-template-columns:1.2fr .72fr .8fr .8fr auto auto auto;gap:8px;margin-top:10px}
input[type=text],select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-size:14px}
.answer-input{font-size:18px!important;padding:12px 14px!important}
button{border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer;font-size:14px}
button:hover{filter:brightness(1.08)} button.primary{background:var(--accent2);border-color:var(--accent2);color:#10211b;font-weight:700}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px} .tab{padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px} .tab.active{background:var(--accent);color:#10211b;border-color:var(--accent);font-weight:700}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px} .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--card);border:1px solid var(--border);font-size:12px;color:var(--muted)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px} .stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px} .num{font-size:24px;font-weight:800;margin-top:4px}
.progress-row{display:flex;justify-content:space-between;margin:8px 0 6px;color:var(--muted);font-size:13px} .progress{height:10px;border-radius:999px;overflow:hidden;background:#202728;border:1px solid var(--border)} .bar{height:100%;width:0%;background:var(--accent2);transition:width .2s ease}
.practice{min-height:700px;display:flex;flex-direction:column;justify-content:space-between} .head{display:flex;justify-content:space-between;gap:8px;align-items:center} .badge{display:inline-block;padding:5px 9px;border-radius:999px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:12px}
.panel{margin-top:4px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:5px 8px} .label{color:var(--muted);font-size:12px}
.question{margin-top:2px;font-size:52px;line-height:1.1;font-weight:800;letter-spacing:.04em;word-break:break-word;text-align:center} .sub{margin-top:2px;color:var(--muted);font-size:13px;text-align:center}
.stroke-row{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:2px;align-items:start;margin-top:0}.stroke-row-hidden{display:flex;justify-content:flex-start;align-items:flex-start;margin-top:0} .stroke{font-size:26px;font-weight:700;word-break:break-word} .mini-map{width:100%;height:auto;display:block;background:#ddd;border:1px solid var(--border);border-radius:12px}
.split6{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px} .mini{border:1px solid var(--border);border-radius:12px;padding:10px;background:var(--panel2);min-height:74px} .mini .k{color:var(--muted);font-size:12px} .mini .v{margin-top:6px;font-size:18px;font-weight:700;word-break:break-word}
.message{margin-top:10px;padding:10px 12px;border-radius:12px;font-size:14px;line-height:1.5} .ok{background:var(--okbg);color:var(--ok);border:1px solid #3f8b6b} .ng{background:var(--ngbg);color:var(--ng);border:1px solid #a06161} .warn{background:var(--warnbg);color:var(--warn);border:1px solid #ac9351}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px} .side-grid{display:grid;grid-template-rows:auto 1fr;gap:12px;min-height:700px} .list{display:flex;flex-direction:column;gap:8px;max-height:580px;overflow:auto;padding-right:2px} .item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px;cursor:pointer} .item.active{outline:2px solid var(--accent);outline-offset:-2px} .item-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start} .item-title{font-size:15px;font-weight:700} .item-meta,.item-stroke{margin-top:4px;color:var(--muted);font-size:12px;word-break:break-word}
.hint{margin-top:10px;padding:10px;background:var(--card);border:1px dashed var(--border);border-radius:14px;color:var(--muted);font-size:12px;line-height:1.5} .reverse-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;max-height:260px;overflow:auto} .reverse-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 10px;cursor:pointer}.reverse-item:hover{filter:brightness(1.08);outline:1px solid var(--accent)} .empty{min-height:300px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
@media (max-width:1100px){ .top,.main{grid-template-columns:1fr} .controls{grid-template-columns:1fr 1fr} .stats{grid-template-columns:1fr 1fr} .split6{grid-template-columns:1fr} .stroke-row{grid-template-columns:1fr} .question{font-size:40px} .stroke{font-size:22px} .side-grid{min-height:auto} .list{max-height:420px} }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <section class="card"><div class="body">
      <h1>メジロ式 練習サイト</h1>
      <div class="desc">GitHubのdefault辞書URLを反映し、動詞・コマンドを更新しました。変則動詞だけのページを追加しています。判定後もフォーカスを維持します。Esc で次へ、回答欄が空のとき Delete（-IU）で前へ戻れます。</div>
      <div class="controls">
        <input id="searchInput" type="text" placeholder="語句・ストローク・カテゴリ検索" />
        <select id="searchModeSelect"><option value="contains">検索: 含む</option><option value="starts">検索: から始まる</option></select>
        <select id="subSelect"></select>
        <select id="answerModeSelect"><option value="text">判定: 出力文字列</option><option value="stroke">判定: ストローク</option></select>
        <button id="toggleStrokeBtn">ストローク非表示</button><button id="shuffleBtn">シャッフル</button><button id="resetBtn">進捗リセット</button>
      </div>
      <div class="row">
        <label class="pill"><input id="hideImeSensitive" type="checkbox" checked />IME注意を隠す</label>
        <label class="pill"><input id="lenientIme" type="checkbox" checked />IMEゆるめ判定</label>
        <label class="pill"><input id="autoNext" type="checkbox" checked />正解で自動次へ</label>
      </div>
      <div id="tabs" class="tabs"></div>
    </div></section>

    <aside class="card"><div class="body">
      <h2>進捗と使い方</h2>
      <div class="progress-row"><span>完了率</span><span id="progressText">0%</span></div>
      <div class="progress"><div id="progressBar" class="bar"></div></div>
      <div class="stats">
        <div class="stat"><div class="muted">表示件数</div><div id="countVisible" class="num">0</div></div>
        <div class="stat"><div class="muted">完了</div><div id="countDone" class="num">0</div></div>
        <div class="stat"><div class="muted">総問題数</div><div id="countTotal" class="num">0</div></div>
        <div class="stat"><div class="muted">逆引き件数</div><div id="countReverse" class="num">0</div></div>
      </div>
      <div class="hint">参考画像に寄せたキー地図を追加しました。一般略語は同じストローク内で助詞キーを末尾に追加できます。<code>n-</code> は「である」、<code>-n</code> は「だ」、<code>n-n</code> は「だった」に変換されます。</div>
    </div></aside>
  </div>

  <div class="main">
    <section class="card"><div class="body practice" id="practiceRoot"></div></section>
    <aside class="side-grid">
      <section class="card"><div class="body">
        <h2>逆引き</h2>
        <div class="desc">文字列からストロークを探します。空欄なら現在の例題で検索します。</div>
        <div class="row"><input id="reverseInput" type="text" placeholder="例: ありがとう / です / でした / する" /></div>
        <div id="reverseList" class="reverse-list"></div>
      </div></section>
      <section class="card"><div class="body">
        <h2>一覧</h2>
        <div id="listRoot" class="list"></div>
      </div></section>
    </aside>
  </div>
</div>

  const parseTop = (seg) => {
    const hy = seg.indexOf("-");
    const left = hy >= 0 ? seg.slice(0, hy) : seg;
    const right = hy >= 0 ? seg.slice(hy + 1) : "";
    return {left, right};
  };

  const top = parseTop(parts[0] || "");
  const lower = parseTop(parts[1] || "");

  const inferLowerFromTop = (seg) => {
    const hy = seg.indexOf("-");

    const consonants = (topSeg.match(/[#STKN]/g) || []).join("") || "—";

    <div class="panel">
      <div class="row" style="justify-content:flex-start;gap:8px;margin-top:0;align-items:center"><div class="label">例題</div><button id="inlineToggleBtn">${state.showStroke?"ストロークを隠す":"ストロークを表示"}</button></div>
      <div class="question">${escapeHtml(item.text)}</div>
      <div class="sub">${escapeHtml(item.subcategory)}${item.note?" / "+escapeHtml(item.note):""}</div>
      ${lrInfo}
    </div>
    <div class="panel">${strokeBody}</div>
    <div class="panel">
      <div class="label">${state.answerMode==="text"?"答えを入力":"ストロークを入力"}</div>
      <input id="answerInput" class="answer-input" type="text" placeholder="${state.answerMode==="text"?"例題どおりの文字列を入力して Enter / Escで次へ / 空欄でDeleteは前へ":"表示されたストロークを入力して Enter / Escで次へ / 空欄でDeleteは前へ"}" value="${escapeAttr(state.answer)}" />
      <div class="actions"><button id="checkBtn" class="primary">判定</button><button id="clearBtn">クリア</button><button id="mainPrevBtn">前へ</button><button id="skipBtn">次へ</button><button id="doneBtn">${done?"完了を外す":"完了にする"}</button></div>
      ${feedback}
    </div>
  </div>
  <div class="actions"><button id="backBtn">戻る</button><button id="prevBtn">前へ</button><button id="nextBtn">次へ</button><button id="randomBtn">ランダム</button></div>`;

  document.getElementById("inlineToggleBtn").addEventListener("click",()=>{state.showStroke=!state.showStroke;state.focusTarget="answer";render();});
  document.getElementById("backBtn").addEventListener("click",()=>{if(state.history && state.history.length){setIndex(state.history.pop(), rows.length);state.focusTarget="answer";render();}});
  document.getElementById("prevBtn").addEventListener("click",()=>prevItem(rows));
  document.getElementById("nextBtn").addEventListener("click",()=>nextItem(rows));
  document.getElementById("randomBtn").addEventListener("click",()=>{if(state.history) state.history.push(state.currentIndex); setIndex(Math.floor(Math.random()*rows.length),rows.length);state.focusTarget="answer";render();});
  document.getElementById("doneBtn").addEventListener("click",()=>{const k=makeKey(item);if(state.done.has(k))state.done.delete(k);else state.done.add(k);state.focusTarget="answer";render();});
  const answerInput=document.getElementById("answerInput");
  answerInput.addEventListener("input",(e)=>{state.answer=e.target.value;state.focusTarget="answer";});
  answerInput.addEventListener("keydown",(e)=>{if(e.key==="Enter"){e.preventDefault();checkAnswer(item,rows);}if(e.key==="Escape"){e.preventDefault();nextItem(rows);}if(e.key==="Delete" && !answerInput.value){e.preventDefault();prevItem(rows);}});
  document.getElementById("checkBtn").addEventListener("click",()=>checkAnswer(item,rows));
  document.getElementById("clearBtn").addEventListener("click",()=>{state.answer="";state.feedback=null;state.focusTarget="answer";render();});
  document.getElementById("mainPrevBtn").addEventListener("click",()=>prevItem(rows));
  document.getElementById("skipBtn").addEventListener("click",()=>nextItem(rows));
}

function checkAnswer(item,rows){
  const raw=state.answer;
  if(!raw.trim()){state.feedback={type:"warn",text:"まだ入力されていません。"};state.focusTarget="answer";render();return;}
  let ok=false;
  if(state.answerMode==="stroke"){ok=normalizeStroke(raw)===normalizeStroke(item.stroke);}
  else{
    const actuals=state.lenientIme?textVariants(raw):[normalizeText(raw)];
    const expectedBase=state.lenientIme?textVariants(item.text):[normalizeText(item.text)];
    const expecteds=new Set(expectedBase);
    if(item.allow_double){for(const v of expectedBase)expecteds.add(v+v);}
    ok=actuals.some(a=>expecteds.has(a));
  }
  if(ok){
    state.done.add(makeKey(item));
    state.answer="";
    state.feedback={type:"ok",text:"正解です。"+(state.autoNext?" 自動で次へ進みます。":"")};
    state.focusTarget="answer"; render();
    if(state.autoNext){setTimeout(()=>{const currentRows=filteredData();const stillHere=currentRows[state.currentIndex];if(stillHere&&makeKey(stillHere)===makeKey(item))nextItem(currentRows);},220);}
  } else {
    const expected=(state.answerMode==="stroke")?item.stroke:item.text+(item.allow_double?" または "+item.text+item.text:"");
    state.feedback={type:"ng",text:`不一致です。入力: 「${escapeInline(raw)}」 / 正解: 「${escapeInline(expected)}」`};
    state.focusTarget="answer"; render();
  }
}
function focusReverseItem(item){
  state.query="";
  state.groupBaseText="";
  state.shuffle=false;
  resetShuffleOrder();

  // 登録動詞または生成済み活用を選んだ場合は、その基礎動詞の活用一式へワープする。
  if(item.category==="動詞" || item.category==="動詞活用"){
    const base=item.base_text||item.text;
    const group=generatedVerbData().filter(x=>x.base_text===base);
    if(group.length){state.category="動詞活用";state.subcategory="すべて";state.groupBaseText=base;setIndex(0,group.length);state.listLimit=300;state.focusTarget="none";render(true);return;}
  }
  // 一般略語も、基礎語を選んだときはその助詞活用一式へ移動する。
  if(item.category==="一般略語" || item.category==="略語活用"){
    const base=item.base_text||item.text;
    const group=generatedAbbreviationData().filter(x=>x.base_text===base);
    if(group.length){state.category="略語活用";state.subcategory="すべて";state.groupBaseText=base;setIndex(0,group.length);state.listLimit=300;state.focusTarget="none";render(true);return;}
  }

  state.category=item.category;
  state.subcategory=item.subcategory;
  const rows=filteredData();
  let idx=rows.findIndex(x=>makeKey(x)===makeKey(item));
  if(idx<0){state.subcategory="すべて";const retry=filteredData();idx=retry.findIndex(x=>makeKey(x)===makeKey(item));setIndex(Math.max(0,idx),retry.length);}else setIndex(idx,rows.length);
  state.listLimit=Math.max(300,Math.ceil((state.currentIndex+1)/300)*300);
  state.focusTarget="none";
  render(true);
}
function renderReverse(rows){
  const matches=currentReverseMatches(rows);
  els.countReverse.textContent=String(matches.length);
  if(!matches.length){els.reverseList.innerHTML=`<div class="muted">候補がありません。</div>`;return;}
  els.reverseList.innerHTML="";
  matches.forEach(item=>{const div=document.createElement("div");div.className="reverse-item";div.title="クリックしてこの問題へ移動";div.innerHTML=`<div><strong>${escapeHtml(item.text)}</strong></div><div class="item-meta">${escapeHtml(item.category)} / ${escapeHtml(item.subcategory)}</div><div class="item-stroke">${escapeHtml(item.stroke)}</div>`;div.addEventListener("click",()=>focusReverseItem(item));els.reverseList.appendChild(div);});
}
function renderList(rows){
  const oldScroll=els.listRoot.scrollTop;
  els.listRoot.innerHTML="";
  const limit=Math.min(rows.length,Math.max(300,state.listLimit||300));
  rows.slice(0,limit).forEach((item,idx)=>{const div=document.createElement("div");div.className="item"+(idx===state.currentIndex?" active":"");div.innerHTML=`<div class="item-top"><div><div class="item-title">${escapeHtml(item.text)}</div><div class="item-meta">${escapeHtml(item.subcategory)}</div></div>${state.done.has(makeKey(item))?'<span class="badge">完了</span>':""}</div><div class="item-stroke">${state.showStroke ? escapeHtml(item.stroke) : ""}</div>`;div.addEventListener("click",()=>{setIndex(idx,rows.length);state.focusTarget="answer";render(true);});els.listRoot.appendChild(div);});
  if(limit<rows.length){const more=document.createElement("div");more.className="muted";more.textContent=`下へスクロールすると続きを表示します（${limit} / ${rows.length}件）`;els.listRoot.appendChild(more);}
  els.listRoot.scrollTop=oldScroll;
}
function renderStats(rows){
  const visibleKeys=new Set(rows.map(makeKey)); let doneCount=0; for(const k of state.done) if(visibleKeys.has(k)) doneCount++;
  const progress=rows.length?Math.round((doneCount/rows.length)*100):0;
  els.progressText.textContent=`${progress}%`; els.progressBar.style.width=`${progress}%`; els.countVisible.textContent=String(rows.length); els.countDone.textContent=String(doneCount); els.countTotal.textContent=String(PRACTICE_DATA.length + PRACTICE_DATA.filter(x=>x.category==="一般略語").length * ABBREV_PARTICLE_TEMPLATES.length + VERB_CONJUGATION_TEMPLATES.length + PRACTICE_DATA.filter(x=>x.category==="動詞").length * VERB_CONJUGATION_TEMPLATES.length);
  els.toggleStrokeBtn.textContent=state.showStroke?"ストローク非表示":"ストローク表示"; els.shuffleBtn.textContent=state.shuffle?"順番固定":"シャッフル"; els.searchInput.value=state.query; els.searchModeSelect.value=state.searchMode; els.answerModeSelect.value=state.answerMode; els.reverseInput.value=state.reverseQuery; els.hideImeSensitive.checked=state.hideImeSensitive; els.lenientIme.checked=state.lenientIme; els.autoNext.checked=state.autoNext;
}
function restoreFocus(){
  if(state.focusTarget==="none")return;
  if(state.focusTarget==="reverse"){els.reverseInput.focus({preventScroll:true});const len=els.reverseInput.value.length;els.reverseInput.setSelectionRange(len,len);return;}
  const input=document.getElementById("answerInput");if(input){input.focus({preventScroll:true});const len=input.value.length;input.setSelectionRange(len,len);}
}
function render(preservePageScroll=false){
  const pageX=window.scrollX,pageY=window.scrollY;
  renderTabs();renderSubSelect();const rows=filteredData();if(state.currentIndex>rows.length-1)state.currentIndex=Math.max(0,rows.length-1);renderPractice(rows);renderReverse(rows);renderList(rows);renderStats(rows);
  setTimeout(()=>{restoreFocus();if(preservePageScroll)window.scrollTo(pageX,pageY);},0);
}
els.searchInput.addEventListener("input",(e)=>{state.query=e.target.value;state.groupBaseText="";state.listLimit=300;resetShuffleOrder();setIndex(0,filteredData().length);state.focusTarget="none";render(true);});
els.reverseInput.addEventListener("input",(e)=>{state.reverseQuery=e.target.value;state.focusTarget="reverse";render(true);});
els.subSelect.addEventListener("change",(e)=>{state.subcategory=e.target.value;state.groupBaseText="";state.listLimit=300;resetShuffleOrder();setIndex(0,filteredData().length);state.focusTarget="none";render(true);});

els.searchModeSelect.addEventListener("change",(e)=>{state.searchMode=e.target.value;state.listLimit=300;resetShuffleOrder();setIndex(0,filteredData().length);state.focusTarget="none";render(true);});
els.listRoot.addEventListener("scroll",()=>{if(els.listRoot.scrollTop+els.listRoot.clientHeight>=els.listRoot.scrollHeight-80){const rows=filteredData();if(state.listLimit<rows.length){state.listLimit=Math.min(rows.length,state.listLimit+300);render(true);}}});
els.answerModeSelect.addEventListener("change",(e)=>{state.answerMode=e.target.value; state.feedback=null; state.answer=""; state.focusTarget="answer"; render();});
els.toggleStrokeBtn.addEventListener("click",()=>{state.showStroke=!state.showStroke; state.focusTarget="answer"; render();});
els.shuffleBtn.addEventListener("click",()=>{state.shuffle=!state.shuffle; resetShuffleOrder(); const rows=filteredData(); setIndex(0,rows.length); state.focusTarget="answer"; render();});
els.resetBtn.addEventListener("click",()=>{state.done=new Set(); state.answer=""; state.feedback=null; state.focusTarget="answer"; render();});
els.hideImeSensitive.addEventListener("change",(e)=>{state.hideImeSensitive=e.target.checked; resetShuffleOrder(); setIndex(0,filteredData().length); state.focusTarget="answer"; render();});
els.lenientIme.addEventListener("change",(e)=>{state.lenientIme=e.target.checked; state.focusTarget="answer"; render();});
els.autoNext.addEventListener("change",(e)=>{state.autoNext=e.target.checked; state.focusTarget="answer"; render();});
render();
</script>
